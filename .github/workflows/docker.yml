name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
      - 'v0.*.*'
  workflow_run:
    workflows: ["Semantic Release"]
    types:
      - completed

env:
  IMAGE_NAME: password-hash

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    # Skip workflow_run jobs if the release workflow failed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        if: github.event_name == 'workflow_run'
        id: get_tag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Docker meta (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch push: SHA uniquement (build de vérification)
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' }}
            # Après semantic-release: tags semver + latest
            type=semver,pattern={{version}},value=${{ steps.get_tag.outputs.tag }},enable=${{ github.event_name == 'workflow_run' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.get_tag.outputs.tag }},enable=${{ github.event_name == 'workflow_run' }}
            type=semver,pattern={{major}},value=${{ steps.get_tag.outputs.tag }},enable=${{ github.event_name == 'workflow_run' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── GitHub Container Registry ─────────────────────────────────────────
      - name: Login to ghcr.io
        if: github.event_name == 'workflow_run'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Docker Hub ────────────────────────────────────────────────────────
      # Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in repo secrets to enable.
      - name: Login to Docker Hub
        if: github.event_name == 'workflow_run'
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Update Docker Hub description
        if: github.event_name == 'workflow_run'
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Push uniquement après semantic-release; les branches font build only
          push: ${{ github.event_name == 'workflow_run' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
